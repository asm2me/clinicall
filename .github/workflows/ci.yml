name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-interaction
        working-directory: backend

      - name: Check PHP syntax
        run: php -l artisan
        working-directory: backend

  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint web workspace
        run: npm run lint --workspace=web

      - name: Build web workspace
        run: npm run build --workspace=web

  mobile:
    name: Mobile checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint mobile workspace
        run: npm run lint --workspace=mobile

      - name: Build mobile workspace
        run: npm run build --workspace=mobile

  workspace:
    name: Root workspace checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Check root scripts
        run: npm run lint