services:
  backend:
    image: php:8.3-cli
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "php backend/artisan"
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm run dev --workspace=web"
    ports:
      - "3001:3000"

  mobile:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm run dev --workspace=mobile"
