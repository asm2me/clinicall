services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL:-http://localhost}
      APP_DEBUG: ${APP_DEBUG:-0}
      APP_TZ: ${APP_TZ:-UTC}
      DB_DRIVER: ${DB_DRIVER:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-clinicall}
      DB_USER: ${DB_USER:-clinicall}
      DB_PASS: ${DB_PASS:-clinicall}
      APP_NAME: ${APP_NAME:-ClinicAll}
      ORG_NAME: ${ORG_NAME:-Default Clinic}
      ORG_SLUG: ${ORG_SLUG:-default-clinic}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      SESSION_SECURE: ${SESSION_SECURE:-0}
    volumes:
      - .:/var/www/html
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    expose:
      - "9000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinicall}
      POSTGRES_USER: ${POSTGRES_USER:-clinicall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinicall}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinicall} -d ${POSTGRES_DB:-clinicall}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mobile:
    image: node:20-alpine
    working_dir: /workspace/clinicall-mobile
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}
      EXPO_NO_TELEMETRY: "1"
    command: sh -c "npm install && npx expo start --tunnel"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/workspace
      - mobile_node_modules:/workspace/clinicall-mobile/node_modules
    restart: unless-stopped
    profiles:
      - mobile

volumes:
  pgdata:
  mobile_node_modules:
