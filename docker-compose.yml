version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinicall
      POSTGRES_PASSWORD: clinicall
      POSTGRES_DB: clinicall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicall -d clinicall"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clinicall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: clinicall-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: clinicall
      MINIO_ROOT_PASSWORD: clinicall123
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 5s
      retries: 5

  web:
    image: node:20-bullseye
    container_name: clinicall-web
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      PNPM_HOME: /pnpm
      PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./:/workspace
      - pnpm_store:/pnpm
    command: >
      sh -lc "corepack enable && corepack prepare pnpm@9.12.3 --activate &&
      pnpm install && pnpm --filter @clinicall/web dev -- --port 3001"

  mobile:
    image: node:20-bullseye
    container_name: clinicall-mobile
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      EXPO_PUBLIC_API_BASE_URL: http://localhost:8000
      PNPM_HOME: /pnpm
      PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./:/workspace
      - pnpm_store:/pnpm
    command: >
      sh -lc "corepack enable && corepack prepare pnpm@9.12.3 --activate &&
      pnpm install && pnpm --filter @clinicall/mobile start -- --web"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pnpm_store:
