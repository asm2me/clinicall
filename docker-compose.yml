services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:80"
    environment:
      APP_URL: http://localhost:8000
      APP_DEBUG: "0"
      APP_TZ: UTC
      DB_DRIVER: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: clinicall
      DB_USER: clinicall
      DB_PASS: clinicall
      APP_NAME: ClinicAll
      ORG_NAME: Default Clinic
      ORG_SLUG: default-clinic
      ADMIN_NAME: Administrator
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMe123!
    volumes:
      - .:/var/www/html
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clinicall
      POSTGRES_USER: clinicall
      POSTGRES_PASSWORD: clinicall
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicall -d clinicall"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
