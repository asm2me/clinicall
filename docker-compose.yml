services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinicall
      POSTGRES_USER: clinicall
      POSTGRES_PASSWORD: clinicall
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: clinicall
      MINIO_ROOT_PASSWORD: clinicallsecret
    ports:
      - "19001:9001"
      - "19000:9000"
    volumes:
      - minio_data:/data

  backend:
    image: php:8.3-cli
    working_dir: /app
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./:/app
    command: sh -c "php backend/artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    volumes:
      - ./:/app
    command: sh -c "npm run dev --workspace=web -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3001:3000"

  mobile:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm run dev --workspace=mobile -- --host 0.0.0.0"
    ports:
      - "8081:8081"
      - "19002:19002"

volumes:
  postgres_data:
  minio_data: